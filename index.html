<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0f1319" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Idle Wanderer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <header class="topbar">
      <div class="title-block">
        <h1>Idle Wanderer</h1>
        <p id="statusText">Tap the ground, a tree, a rock, a fishing spot, or a town.</p>
      </div>
      <button id="saveButton" class="icon-button">Save</button>
    </header>

    <section class="game-shell">
      <canvas id="gameCanvas" width="480" height="640" aria-label="Idle Wanderer world map"></canvas>
      <div class="hud location-hud"><span>Region</span><strong id="regionText">Central Grass</strong></div>
      <div id="toast" class="toast" aria-live="polite"></div>
    </section>

    <section class="action-strip">
      <div class="action-copy"><span class="label">Current action</span><strong id="actionName">Exploring</strong></div>
      <div class="progress-track"><div id="actionProgress" class="progress-fill"></div></div>
      <button id="stopButton" class="stop-button">Stop</button>
    </section>

    <nav class="tabs" aria-label="Game panels">
      <button class="tab active" data-panel="inventory">Inv</button>
      <button class="tab" data-panel="skills">Skills</button>
      <button class="tab" data-panel="equipment">Equip</button>
      <button class="tab" data-panel="map">Map</button>
      <button class="tab" data-panel="menu">Menu</button>
    </nav>

    <section class="panel-wrap">
      <section id="inventory" class="panel active"></section>
      <section id="skills" class="panel"></section>
      <section id="equipment" class="panel"></section>
      <section id="map" class="panel"></section>
      <section id="menu" class="panel">
        <div class="menu-grid">
          <button id="exportButton" class="wide-button">Export Save</button>
          <label class="wide-button file-button">Import Save<input id="importInput" type="file" accept="application/json" /></label>
          <button id="resetButton" class="wide-button muted-button">Reset Game</button>
        </div>
        <p class="hint">Town services are opened from the world itself. Skills will be developed one at a time, beginning with Woodcutting.</p>
        <p class="version">Version 0.6.0 · Mining & Minimap</p>
      </section>
    </section>
  </main>

  <dialog id="itemDialog" class="item-dialog">
    <div class="dialog-head"><div><span id="itemType" class="label"></span><h2 id="itemName"></h2></div><button id="closeItemButton" class="close-button" aria-label="Close">×</button></div>
    <p id="itemDescription" class="item-description"></p>
    <div id="itemStats" class="stat-list"></div>
    <button id="itemActionButton" class="wide-button dialog-action" hidden></button>
  </dialog>

  <dialog id="townDialog" class="item-dialog town-dialog">
    <div class="dialog-head"><div><span class="label">Town</span><h2 id="townName">Town</h2></div><button id="closeTownButton" class="close-button" aria-label="Close">×</button></div>
    <p id="townDescription" class="item-description"></p>
    <div id="townServices" class="town-services"></div>
  </dialog>

  <script src="game.js"></script>
</body>
</html>
